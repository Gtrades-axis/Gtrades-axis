<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lesson | GTRADES-AXIS™ Premium Academy</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="premium-academy.css">

<link rel="stylesheet"
href="lesson.css">

</head>

<body>

<div class="lesson-layout">

    <!-- =========================================
    SIDEBAR
    ========================================== -->

    <aside class="lesson-sidebar">

        <div class="sidebar-header">

            <button

            class="back-btn"

            onclick="history.back()">

                <i class="fas fa-arrow-left"></i>

                Back

            </button>

            <h2>

                Lesson List

            </h2>

            <p id="moduleName">

                Loading...

            </p>

        </div>

        <div

        id="lessonSidebar"

        class="lesson-sidebar-list">

        </div>

    </aside>

    <!-- =========================================
    MAIN CONTENT
    ========================================== -->

    <main class="lesson-content">

        <!-- Lesson Header -->

        <section class="lesson-header">

            <span

            id="lessonNumber"

            class="lesson-tag">

                Lesson

            </span>

            <h1

            id="lessonTitle">

                Loading...

            </h1>

            <p

            id="lessonDescription">

                Loading lesson...

            </p>

        </section>

        <!-- ==============================
        VIDEO PLAYER
        =============================== -->

        <section class="video-card">

            <div class="video-wrapper">

                <iframe

                id="lessonVideo"

                src=""

                title="Lesson Video"

                allowfullscreen>

                </iframe>

            </div>

        </section>

        <!-- ==============================
        LESSON NOTES
        =============================== -->

        <section class="notes-card">

            <div class="card-title">

                <h2>

                    Lesson Notes

                </h2>

            </div>

            <div

            id="lessonNotes"

            class="lesson-notes">

                Lesson notes will appear here.

            </div>

        </section>

        <!-- ==============================
        DOWNLOADS
        =============================== -->

        <section class="downloads-card">

            <div class="card-title">

                <h2>

                    Resources

                </h2>

            </div>

            <div class="downloads">

                <button

                id="downloadPDF"

                class="download-btn">

                    <i class="fas fa-file-pdf"></i>

                    Download PDF

                </button>

            </div>

        </section>

        <!-- ==============================
        NAVIGATION
        =============================== -->

        <section class="lesson-navigation">

            <button

            id="previousLesson"

            class="nav-btn">

                <i class="fas fa-arrow-left"></i>

                Previous

            </button>

            <button

            id="completeLesson"

            class="complete-btn">

                ✓ Complete Lesson

            </button>

            <button

            id="nextLesson"

            class="nav-btn">

                Next

                <i class="fas fa-arrow-right"></i>

            </button>

        </section>

    </main>

</div>

<script src="academyData.js"></script>

<script src="lesson.js"></script>

</body>

</html>
