<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GTRADES-AXIS™</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .msg.success { background: rgba(0,200,83,0.15); color: #00c853; border: 1px solid rgba(0,200,83,0.3); display: block; }
        .msg.error { background: rgba(255,77,79,0.15); color: #ff4d4f; border: 1px solid rgba(255,77,79,0.3); display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="images/logo.png" class="login-logo" alt="Logo">
            <h1>Create Account</h1>
            <p>Join GTRADES-AXIS</p>
            <div id="errorMsg" class="msg error" style="display:none;"></div>
            <div id="successMsg" class="msg success" style="display:none;"></div>
            <form id="registerForm">
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Password (min 6 chars)" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-check-circle"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="login-btn"><i class="fa-solid fa-user-plus"></i> Create Account</button>
            </form>
            <div class="login-links">Already have an account? <a href="login.html">Log in</a></div>
            <a class="back-home" href="index.html">← Back to Home</a>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
