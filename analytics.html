<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade History | GTRADES-AXIS™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/history.css">
  <!-- we'll add custom styles inline -->
  <style>
    /* your existing styles plus enhancements */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0e17;
      color: #e2e8f0;
    }
    .dashboard-container { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.06); padding: 20px; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
    .logo h2 { font-size: 1.2rem; color: #f1f5f9; }
    .logo h2 span { background: linear-gradient(135deg, #0f8cff, #00c853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; text-decoration: none; transition: 0.2s; }
    .sidebar nav a:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .sidebar nav a.active { background: rgba(15,140,255,0.12); color: #0f8cff; border-left: 3px solid #0f8cff; }
    .main-content { flex: 1; padding: 24px 32px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }
    .page-header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #f1f5f9, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-header p { color: #94a3b8; }
    .header-actions { display: flex; gap: 10px; }
    .btn { padding: 8px 18px; background: rgba(15,140,255,0.12); border: none; border-radius: 8px; color: #0f8cff; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
    .btn:hover { background: rgba(15,140,255,0.25); transform: translateY(-2px); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 20px; text-align: center; backdrop-filter: blur(12px); transition: 0.3s; }
    .stat-card:hover { transform: translateY(-4px); border-color: rgba(15,140,255,0.3); }
    .stat-card h3 { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card h1 { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; margin-top: 4px; }
    .history-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .history-controls input, .history-controls select { padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #e2e8f0; font-family: 'Poppins', sans-serif; outline: none; transition: 0.2s; }
    .history-controls input:focus, .history-controls select:focus { border-color: #0f8cff; box-shadow: 0 0 0 3px rgba(15,140,255,0.1); }
    .history-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; backdrop-filter: blur(12px); overflow-x: auto; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .table-header h2 { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; color: #e2e8f0; }
    .table-header h2 i { color: #0f8cff; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .history-table th { text-align: left; padding: 12px 14px; color: #94a3b8; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .history-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .history-table tr:hover { background: rgba(255,255,255,0.03); }
    .positive { color: #00c853; }
    .negative { color: #ff4d4f; }
    .result-win { color: #00c853; }
    .result-loss { color: #ff4d4f; }
    .result-break-even { color: #ffb300; }
    .empty { text-align: center; padding: 40px; color: #64748b; }
    .btn-small { padding: 4px 8px; background: rgba(255,255,255,0.05); border: none; border-radius: 6px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
    .btn-small:hover { background: rgba(255,255,255,0.1); color: #f1f5f9; }
    .btn-small.danger:hover { background: rgba(255,77,79,0.2); color: #ff4d4f; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #141a26; border-radius: 20px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 24px; border: 1px solid rgba(255,255,255,0.06); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h2 { color: #f1f5f9; }
    .closeModal { font-size: 1.8rem; color: #94a3b8; cursor: pointer; background: none; border: none; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .detail-table td:first-child { font-weight: 500; color: #94a3b8; width: 40%; }
    .detail-table td:last-child { color: #f1f5f9; }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { padding: 16px; } .stats-grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<div class="dashboard-container">
  <!-- sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="images/logo.png" alt="Logo" style="width:40px;">
      <h2>GTRADES <span>AXIS™</span></h2>
    </div>
    <nav>
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="journal.html"><i class="fa-solid fa-book"></i> Trading Journal</a>
      <a href="analytics.html"><i class="fa-solid fa-chart-column"></i> Analytics</a>
      <a class="active" href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1><i class="fa-solid fa-clock-rotate-left" style="background: none; -webkit-text-fill-color: #0f8cff;"></i> Trading History</h1>
        <p>Review every trade you've taken.</p>
      </div>
      <div class="header-actions">
        <a href="#" onclick="history.back(); return false;" class="btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <a href="journal.html" class="btn"><i class="fa-solid fa-plus"></i> New Trade</a>
      </div>
    </div>

    <!-- stats -->
    <section class="stats-grid">
      <div class="stat-card"><h3>Total Trades</h3><h1 id="historyTotalTrades">0</h1></div>
      <div class="stat-card"><h3>Total Wins</h3><h1 id="historyWins">0</h1></div>
      <div class="stat-card"><h3>Total Losses</h3><h1 id="historyLosses">0</h1></div>
      <div class="stat-card"><h3>Win Rate</h3><h1 id="historyWinRate">0%</h1></div>
    </section>

    <!-- filters -->
    <section class="history-controls">
      <input type="text" id="tradeSearch" placeholder="🔍 Search Pair...">
      <select id="filterPair"><option value="">All Pairs</option></select>
      <select id="filterSession"><option value="">All Sessions</option><option>Asian</option><option>London</option><option>New York</option><option>London + NY</option></select>
      <select id="filterResult"><option value="">All Results</option><option>Win</option><option>Loss</option><option>Break Even</option></select>
    </section>

    <!-- table -->
    <section class="history-card">
      <div class="table-header">
        <h2><i class="fa-solid fa-table"></i> Trade History</h2>
        <button id="exportCSV" class="btn"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
      </div>
      <div class="table-responsive">
        <table class="history-table">
          <thead><tr><th>Date</th><th>Pair</th><th>Direction</th><th>Session</th><th>Model</th><th>Result</th><th>RR</th><th>P/L</th><th>Actions</th></tr></thead>
          <tbody id="historyBody"><tr><td colspan="9" class="empty">No trades recorded yet.</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- modal -->
    <div id="tradeModal" class="modal">
      <div class="modal-content">
        <div class="modal-header"><h2>Trade Details</h2><button class="closeModal">&times;</button></div>
        <div id="tradeDetails"></div>
      </div>
    </div>

    <!-- scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/history.js"></script>
  </main>
</div>
</body>
</html>
