<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GTRADES-AXIS™</title>
  <!-- your styles (same as before) -->
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <img src="images/logo.png" class="login-logo" alt="Logo" />
      <h1>Welcome <span>Back</span></h1>
      <p>Log in to your trading dashboard</p>

      <div id="errorMsg" class="msg"></div>
      <div id="successMsg" class="msg"></div>

      <form id="loginForm">
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input type="email" id="email" placeholder="Email Address" required />
        </div>
        <div class="input-group">
          <i class="fa fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <button type="submit" class="login-btn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Log In
        </button>
      </form>

      <div class="login-links">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
      <a class="back-home" href="index.html">← Back to Home</a>
    </div>
  </div>

  <!-- ✅ Only one script – does everything -->
   <script type="module" src="js/auth.js"></script>


</body>
</html>
