<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GTRADES-AXIS™</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .msg.error {
            background: rgba(255,77,79,0.15);
            border: 1px solid rgba(255,77,79,0.25);
            color: #ff4d4f;
            display: block;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <img src="images/logo.png" class="login-logo" alt="Logo">
            <h1>Welcome <span style="background:linear-gradient(135deg,#0f8cff,#00c853);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Back</span></h1>
            <p>Login to access your Academy Resources</p>

            <div id="errorMsg" class="msg error" style="display:none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Log In
                </button>
            </form>

            <div class="login-links">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
            <a class="back-home" href="index.html">← Back to Home</a>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
