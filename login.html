<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | GTRADES-AXIS™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <!-- Logo -->
            <div class="logo-wrapper">
                <img
                    src="images/imageslogo.png.png"
                    alt="GTRADES-AXIS Logo"
                    class="login-logo"
                    draggable="false"
                />
            </div>

            <h1>Welcome <span class="gradient-text">Back</span></h1>
            <p class="subtitle">Login to access your Academy Resources</p>

            <!-- Error message -->
            <div id="errorMsg" class="msg error" style="display:none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" value="GTRADES@GMAIL.COM" required />
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required />
                    <button type="button" class="toggle-pw" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Log In</span>
                </button>
            </form>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">secure access</span>
                <span class="divider-line"></span>
            </div>

            <div class="login-links">
                Don't have an account? <a href="register.html">Create one</a>
            </div>

            <a class="back-home" href="index.html">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>

    <script>
        (function() {
            const toggleBtn = document.getElementById('togglePassword');
            const pwInput = document.getElementById('password');
            if (toggleBtn && pwInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    pwInput.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-eye');
                        icon.classList.toggle('fa-eye-slash');
                    }
                });
            }
        })();
    </script>

</body>
</html>
