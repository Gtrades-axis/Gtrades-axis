<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | GTRADES-AXIS™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 20% 50%, #0b1a2e, #050b14);
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Animated Orb Background ── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0f8cff, #0044cc);
            top: -100px;
            right: -100px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00c853, #008c2b);
            bottom: -80px;
            left: -80px;
            animation-delay: 4s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(60px, 40px) scale(1.2);
            }
        }

        /* ── Grid overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* ── Login Card ── */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 2.8rem 2.4rem 2.6rem;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            text-align: center;
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 40px 100px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* ── Logo ── */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.2rem;
            position: relative;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(15, 140, 255, 0.15), transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }

        .login-logo {
            position: relative;
            z-index: 1;
            width: 130px;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(15, 140, 255, 0.3));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: block;
            border-radius: 20px;
        }

        .login-logo:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        /* ── Typography ── */
        .login-card h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
        }

        .login-card h1 .gradient-text {
            background: linear-gradient(135deg, #0f8cff, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 1.8rem;
            letter-spacing: 0.3px;
        }

        /* ── Message ── */
        .msg {
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            display: none;
            text-align: left;
            backdrop-filter: blur(4px);
        }
        .msg.error {
            background: rgba(255, 77, 79, 0.12);
            border: 1px solid rgba(255, 77, 79, 0.2);
            color: #ff6b6b;
            display: block;
        }
        .msg.success {
            background: rgba(0, 200, 83, 0.12);
            border: 1px solid rgba(0, 200, 83, 0.2);
            color: #69db7c;
            display: block;
        }

        /* ── Form ── */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 0 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(15, 140, 255, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(15, 140, 255, 0.08), inset 0 0 0 1px rgba(15, 140, 255, 0.1);
        }

        .input-group i {
            color: rgba(255, 255, 255, 0.25);
            font-size: 1rem;
            transition: color 0.3s ease;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .input-group:focus-within i {
            color: #0f8cff;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 0.8rem;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
            font-size: 0.85rem;
        }

        .input-group input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(20, 30, 48, 0.9) inset !important;
            -webkit-text-fill-color: #fff !important;
            border-radius: 16px;
        }

        /* ── Password toggle ── */
        .toggle-pw {
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            transition: color 0.3s ease;
            padding: 0 0 0 0.4rem;
            flex-shrink: 0;
            background: transparent;
            border: none;
        }
        .toggle-pw:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        /* ── Login Button ── */
        .login-btn {
            margin-top: 0.4rem;
            padding: 0.9rem 1.8rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #0f8cff, #0066dd);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(15, 140, 255, 0.25);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00c853, #0f8cff);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 16px;
        }

        .login-btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 32px rgba(15, 140, 255, 0.35);
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .login-btn i,
        .login-btn span {
            position: relative;
            z-index: 1;
        }

        .login-btn i {
            font-size: 1.1rem;
        }

        /* ── Links ── */
        .login-links {
            margin-top: 1.6rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .login-links a {
            color: #0f8cff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            position: relative;
        }

        .login-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0f8cff, #00c853);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .login-links a:hover {
            color: #4da6ff;
            text-shadow: 0 0 20px rgba(15, 140, 255, 0.2);
        }

        .login-links a:hover::after {
            width: 100%;
        }

        .back-home {
            display: inline-block;
            margin-top: 1.2rem;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            transition: color 0.3s ease, transform 0.3s ease;
            letter-spacing: 0.2px;
        }

        .back-home:hover {
            color: rgba(255, 255, 255, 0.5);
            transform: translateX(-4px);
        }

        .back-home i {
            margin-right: 4px;
            font-size: 0.7rem;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.6rem 0 0.2rem;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        }
        .divider-text {
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.4rem 2rem;
                border-radius: 28px;
            }
            .login-logo {
                width: 100px;
            }
            .logo-wrapper::after {
                width: 100px;
                height: 100px;
            }
            .login-card h1 {
                font-size: 1.6rem;
            }
            .input-group input {
                font-size: 0.85rem;
                padding: 0.8rem 0.6rem;
            }
            .login-btn {
                font-size: 0.9rem;
                padding: 0.8rem 1.4rem;
            }
            body {
                padding: 1rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.6rem 1rem 1.8rem;
                border-radius: 24px;
            }
            .login-logo {
                width: 80px;
            }
            .logo-wrapper::after {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── Grid Overlay ─── -->
    <div class="grid-overlay"></div>

    <!-- ─── Login Container ─── -->
    <div class="login-container">
        <div class="login-card">

            <!-- Logo -->
            <div class="logo-wrapper">
                <img
                src="images/imageslogo.png.png"
                alt="GTRADES-AXIS Logo"
                class="login-logo"
                draggable="false"
                />
            </div>

            <!-- Heading -->
            <h1>Welcome <span class="gradient-text">Back</span></h1>
            <p class="subtitle">Login to access your Academy Resources</p>

            <!-- Message -->
            <div id="errorMsg" class="msg error" style="display:none;"></div>

            <!-- Form -->
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required autocomplete="email" />
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
                    <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Log In</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">secure access</span>
                <span class="divider-line"></span>
            </div>

            <!-- Links -->
            <div class="login-links">
                Don't have an account? <a href="register.html">Create one</a>
            </div>

            <a class="back-home" href="index.html">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- ─── Auth Script ─── -->
    <script type="module" src="js/auth.js"></script>

    <!-- ─── Inline: Password Toggle ─── -->
    <script>
        (function() {
            const toggleBtn = document.getElementById('togglePassword');
            const pwInput = document.getElementById('password');
            if (toggleBtn && pwInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    pwInput.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-eye');
                        icon.classList.toggle('fa-eye-slash');
                    }
                });
            }
        })();
    </script>

</body>
</html>
