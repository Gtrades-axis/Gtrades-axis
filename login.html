<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | GTRADES-AXIS™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ✅ Clean, professional dark gradient – no messy orbs */
            background: linear-gradient(145deg, #070d18 0%, #0b1a2e 45%, #0d1f2e 100%);
            padding: 1.5rem;
        }

        /* ─── SOFT GLOW BEHIND CARD (elegant & subtle) ─── */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(15, 140, 255, 0.08), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── CENTERED CARD ─── */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 3rem 2.4rem 2.6rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* ─── LOGO – FITS ALL DEVICES PERFECTLY ─── */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.6rem;
        }

        .login-logo {
            width: clamp(120px, 35vw, 180px); /* ✅ scales from phone → tablet → desktop */
            height: auto;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(15, 140, 255, 0.2));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: block;
            border-radius: 16px;
        }

        .login-logo:hover {
            transform: scale(1.03);
        }

        /* ─── TYPOGRAPHY ─── */
        .login-card h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
        }

        .login-card h1 .gradient-text {
            background: linear-gradient(135deg, #0f8cff, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
            font-weight: 400;
            margin-bottom: 2rem;
            letter-spacing: 0.2px;
        }

        /* ─── FORM ─── */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 0 1.2rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(15, 140, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(15, 140, 255, 0.04);
        }

        .input-group i {
            color: rgba(255, 255, 255, 0.15);
            font-size: 1rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 0.8rem;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }

        .input-group input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(15, 25, 40, 0.95) inset !important;
            -webkit-text-fill-color: #fff !important;
            border-radius: 16px;
        }

        /* ─── BUTTON ─── */
        .login-btn {
            margin-top: 0.4rem;
            padding: 0.9rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #0f8cff, #0066dd);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(15, 140, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00c853, #0f8cff);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 16px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(15, 140, 255, 0.3);
        }
        .login-btn:hover::before {
            opacity: 1;
        }
        .login-btn i,
        .login-btn span {
            position: relative;
            z-index: 1;
        }

        /* ─── DIVIDER ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.6rem 0 1rem;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        }
        .divider-text {
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ─── LINKS ─── */
        .login-links {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }
        .login-links a {
            color: #0f8cff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .login-links a:hover {
            color: #4da6ff;
        }

        .back-home {
            display: inline-block;
            margin-top: 1.2rem;
            color: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        .back-home:hover {
            color: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }
        .back-home i {
            margin-right: 4px;
            font-size: 0.7rem;
        }

        /* ─── RESPONSIVE TWEAKS ─── */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.4rem 2rem;
                border-radius: 32px;
            }
            .login-logo {
                width: clamp(100px, 40vw, 140px);
            }
            .input-group input {
                font-size: 0.85rem;
                padding: 0.8rem 0.6rem;
            }
            body {
                padding: 1rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.6rem 1rem 1.8rem;
            }
            .login-logo {
                width: clamp(80px, 35vw, 110px);
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <!-- ✅ LARGE, RESPONSIVE LOGO -->
            <div class="logo-wrapper">
                <img
                    src="images/imageslogo.png.png"
                    alt="GTRADES-AXIS Logo"
                    class="login-logo"
                    draggable="false"
                />
            </div>

            <h1>Welcome <span class="gradient-text">Back</span></h1>
            <p class="subtitle">Login to access your Academy Resources</p>

            <!-- Error message area -->
            <div id="errorMsg" class="msg error" style="display:none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <!-- Pre‑filled as shown in your image -->
                    <input type="email" id="email" value="qwtuhku7981@gmail.com" required />
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required />
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Log In</span>
                </button>
            </form>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">secure access</span>
                <span class="divider-line"></span>
            </div>

            <div class="login-links">
                Don't have an account? <a href="register.html">Create one</a>
            </div>

            <a class="back-home" href="index.html">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- Your auth logic -->
    <script type="module" src="js/auth.js"></script>

</body>
</html>
