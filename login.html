<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GTRADES-AXIS™</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .msg.error { background: rgba(255,77,79,0.15); color: #ff4d4f; border: 1px solid rgba(255,77,79,0.3); display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="images/logo.png" class="login-logo" alt="Logo">
            <h1>Welcome Back</h1>
            <p>Login to your account</p>
            <div id="errorMsg" class="msg error" style="display:none;"></div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> Log In</button>
            </form>
            <div class="login-links">Don't have an account? <a href="register.html">Create one</a></div>
            <a class="back-home" href="index.html">← Back to Home</a>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
