<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied | GTRADES-AXIS™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0e17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .container i {
      font-size: 4rem;
      color: #ff4d4f;
      margin-bottom: 20px;
    }
    .container h1 {
      font-size: 1.8rem;
      color: #f1f5f9;
      margin-bottom: 8px;
    }
    .container p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .container .btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #0f8cff, #0077e6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s ease;
    }
    .container .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(15,140,255,0.35);
    }
    .container .logout-link {
      display: block;
      margin-top: 16px;
      color: #64748b;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .container .logout-link:hover {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <i class="fa-solid fa-lock"></i>
    <h1>Access Denied</h1>
    <p>
      This content is for <strong>Premium members</strong> only.<br />
      Please upgrade your account to access the Academy, Resources, and other premium features.
    </p>
    <a href="dashboard.html" class="btn">Go to Dashboard</a>
    <a href="#" id="logoutAccessDenied" class="logout-link">
      <i class="fa-solid fa-right-from-bracket"></i> Log out
    </a>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module">
    import { auth } from "./js/firebase.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
    document.getElementById("logoutAccessDenied").addEventListener("click", async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
