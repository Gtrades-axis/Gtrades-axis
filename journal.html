href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

</aside>

<main class="main-content">

<div class="topbar">

<h1>

Trading Journal

</h1>

<p>

Track every trade professionally.

</p>

</div>

<section class="journal-container">

<!-- ===========================
STATISTICS
=========================== -->

<div class="stats-grid">

<div class="stat-card">

<div class="stat-icon">

<i class="fa-solid fa-chart-column"></i>

</div>

<div>

<h2 id="totalTrades">0</h2>

<p>Total Trades</p>

</div>

</div>

<div class="stat-card">

<div class="stat-icon">

<i class="fa-solid fa-bullseye"></i>

</div>

<div>

<h2 id="winRate">0%</h2>

<p>Win Rate</p>

</div>

</div>

<div class="stat-card">

<div class="stat-icon">

<i class="fa-solid fa-scale-balanced"></i>

</div>

<div>

<h2 id="averageRR">0</h2>

<p>Average RR</p>

</div>

</div>

<div class="stat-card">

<div class="stat-icon">

<i class="fa-solid fa-sack-dollar"></i>

</div>

<div>

<h2 id="netProfit">$0</h2>

<p>Net Profit</p>

</div>

</div>

</div>

<!-- ===========================
NEW TRADE
=========================== -->

<div class="latest-card">

<h2>

<i class="fa-solid fa-plus"></i>

New Trade

</h2>

<form id="tradeForm">

<div class="journal-grid">

<input
type="text"
id="pair"
placeholder="Pair (EURUSD)"
required>

<select id="direction">

<option value="">Direction</option>

<option>BUY</option>

<option>SELL</option>

</select>

<input
type="date"
id="tradeDate"
required>

<select id="timeframe">

<option>5M,1M,3M</option>

<option>15M</option>

<option>1H</option>

<option>4H</option>

</select>

<select id="session">

<option>Asia</option>

<option>London</option>

<option>New York</option>

</select>
<select id="session">

<option>Asia</option>

<option>London</option>

<option>New York</option>

</select>

<select id="setup">

<option>Supply</option>

<option>Demand</option>

<option>BOS</option>

<option>CHOCH</option>

<option>Liquidity Sweep</option>

<option>LTF Confirmation </option>

</select>

<input
type="number"
step="0.01"
id="entry"
placeholder="Entry">
<input
type="number"
step="0.01"
id="rr"
placeholder="RR">

<input
type="number"
step="0.01"
id="profit"
placeholder="Profit">

<select id="result">

<option>Win</option>

<option>Loss</option>

<option>Break Even</option>

</select>

</div>

<textarea

id="notes"

placeholder="Trade Notes"

rows="5">

</textarea>

<button

class="btn btn-primary"

type="submit">

Save Trade

</button>

</form>

</div>

<!-- ===========================
TRADE HISTORY
=========================== -->

<div class="latest-card">

<div class="card-header">

<h2>

Trade History

</h2>

<input

id="tradeSearch"

type="text"

placeholder="Search Trade">

</div>

<div id="tradeHistory">

No Trades Yet

</div>

</div>

</section>

</main>

</div>

<script type="module" src="js/authGuard.js"></script>

<script type="module" src="js/journal.js"></script>

</body>

</html>
