<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Professional Trading Journal | GTRADES AXIS™</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/journal.css">

</head>

<body>


<<!-- ======================================================
JOURNAL DASHBOARD
====================================================== -->

<section class="dashboard-overview">

    <div class="overview-card">
        <span>Total Trades</span>
        <h2 id="totalTrades">0</h2>
    </div>

    <div class="overview-card">
        <span>Win Rate</span>
        <h2 id="winRate">0%</h2>
    </div>

    <div class="overview-card">
        <span>Average RR</span>
        <h2 id="averageRR">0</h2>
    </div>

    <div class="overview-card">
        <span>Net Profit</span>
        <h2 id="netProfit">$0</h2>
    </div>

    <div class="overview-card">
        <span>Wins</span>
        <h2 id="wins">0</h2>
    </div>

    <div class="overview-card">
        <span>Losses</span>
        <h2 id="losses">0</h2>
    </div>

    <div class="overview-card">
        <span>Trader Grade</span>
        <h2 id="traderGrade">-</h2>
    </div>

    <div class="overview-card">
        <span>Consistency</span>
        <h2 id="consistencyScore">0%</h2>
    </div>

</section>

<!-- ======================================================
CHARTS
====================================================== -->

<section class="chart-layout">

    <div class="chart-box">

        <h3>Equity Curve</h3>

        <canvas id="equityChart"></canvas>

    </div>

    <div class="chart-box">

        <h3>Monthly Performance</h3>

        <canvas id="monthlyChart"></canvas>

    </div>

</section>

<!-- ======================================================
PERFORMANCE
====================================================== -->

<section class="performance-grid">

    <div class="performance-card">

        <h3>Best Pair</h3>

        <h2 id="bestPair">-</h2>

    </div>

    <div class="performance-card">

        <h3>Worst Pair</h3>

        <h2 id="worstPair">-</h2>

    </div>

    <div class="performance-card">

        <h3>Best Session</h3>

        <h2 id="bestSession">-</h2>

    </div>

    <div class="performance-card">

        <h3>Win Streak</h3>

        <h2 id="winStreak">0</h2>

    </div>

    <div class="performance-card">

        <h3>Max Drawdown</h3>

        <h2 id="maxDrawdown">$0</h2>

    </div>

    <div class="performance-card">

        <h3>Execution Score</h3>

        <h2 id="executionScore">0%</h2>

    </div>

</section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="js/journal.js"></script>

</body>
</body>
</html>
