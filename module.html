<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Module | GTRADES-AXIS™</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="premium-academy.css">

<link rel="stylesheet"
href="module.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="module-container">

    <!-- =========================
         HEADER
    ========================== -->

    <header class="module-header">

        <button
        class="back-btn"
        onclick="history.back()">

            <i class="fas fa-arrow-left"></i>

            Back

        </button>

        <div>

            <h1 id="moduleTitle">

                Loading...

            </h1>

            <p id="moduleDescription">

                Loading...

            </p>

        </div>

    </header>

    <!-- =========================
         MODULE INFO
    ========================== -->

    <section class="module-info">

        <div class="module-progress-card">

            <h3>

                Module Progress

            </h3>

            <div class="module-progress">

                <div
                id="moduleProgressBar"
                class="module-progress-fill">

                </div>

            </div>

            <p id="moduleProgressText">

                0%

            </p>

        </div>

        <div class="module-summary">

            <div class="summary-box">

                <h2 id="totalLessons">

                    0

                </h2>

                <p>

                    Lessons

                </p>

            </div>

            <div class="summary-box">

                <h2>

                    Beginner

                </h2>

                <p>

                    Level

                </p>

            </div>

            <div class="summary-box">

                <h2 id="moduleDuration">

                    0 min

                </h2>

                <p>

                    Duration

                </p>

            </div>

        </div>

    </section>

    <!-- =========================
         LESSONS
    ========================== -->

    <section>

        <div class="section-title">

            <h2>

                Lessons

            </h2>

        </div>

        <div
        id="lessonList"
        class="lesson-list">

        </div>

    </section>

</div>

<script src="academyData.js"></script>

<script src="module.js"></script>

</body>

</html>
