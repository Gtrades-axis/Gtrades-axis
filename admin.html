<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | GTRADES-AXIS™</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Your existing admin.css – or you can keep it separate -->
    <style>
        /* ============================================
           ADMIN PANEL STYLES (improved)
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            font-family: 'Poppins', sans-serif;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #0f8cff, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-header .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 77, 79, 0.15);
            border: 1px solid rgba(255, 77, 79, 0.2);
            border-radius: 10px;
            color: #ff4d4f;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: 0.3s ease;
            font-size: 0.9rem;
        }

        .admin-header .logout-btn:hover {
            background: rgba(255, 77, 79, 0.25);
            transform: translateY(-2px);
        }

        .admin-controls {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        #memberSearch {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e2e8f0;
            width: 100%;
            max-width: 300px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s ease;
            outline: none;
        }

        #memberSearch:focus {
            border-color: #0f8cff;
            background: rgba(15, 140, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(15, 140, 255, 0.1);
        }

        #memberSearch::placeholder {
            color: #475569;
        }

        /* ===== TABLE ===== */
        .table-responsive {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px 0;
        }

        .members-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .members-table th {
            text-align: left;
            padding: 14px 16px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .members-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        .members-table tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .members-table .empty {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        .badge.admin { background: rgba(15, 140, 255, 0.2); color: #0f8cff; }
        .badge.premium { background: rgba(255, 179, 0, 0.2); color: #ffb300; }
        .badge.member { background: rgba(255, 255, 255, 0.08); color: #94a3b8; }
        .badge.active { background: rgba(0, 200, 83, 0.2); color: #00c853; }
        .badge.pending { background: rgba(255, 179, 0, 0.15); color: #ffb300; }
        .badge.suspended { background: rgba(255, 77, 79, 0.2); color: #ff4d4f; }

        /* ===== USER CELL ===== */
        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f8cff, #00c853);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
        }

        .user-cell strong {
            color: #f1f5f9;
        }

        .user-cell small {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        /* ===== MANAGE BUTTON ===== */
        .manage-btn {
            padding: 6px 16px;
            background: rgba(15, 140, 255, 0.12);
            border: none;
            border-radius: 8px;
            color: #0f8cff;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            transition: 0.2s ease;
        }

        .manage-btn:hover {
            background: rgba(15, 140, 255, 0.25);
            transform: scale(1.02);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #141a26;
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            color: #f1f5f9;
        }

        .close-modal {
            font-size: 1.8rem;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s ease;
            background: none;
            border: none;
            font-family: 'Poppins', sans-serif;
        }

        .close-modal:hover {
            color: #f1f5f9;
            transform: rotate(90deg);
        }

        .modal-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f8cff, #00c853);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 16px;
        }

        .modal-field {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .modal-field .label {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .modal-field .value {
            color: #f1f5f9;
            font-weight: 500;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }

        .modal-actions .approve { background: #00c853; color: #fff; }
        .modal-actions .approve:hover { background: #00e676; transform: scale(1.02); }

        .modal-actions .premium { background: #ffb300; color: #1a1a2e; }
        .modal-actions .premium:hover { background: #ffd740; transform: scale(1.02); }

        .modal-actions .admin { background: #0f8cff; color: #fff; }
        .modal-actions .admin:hover { background: #1a98ff; transform: scale(1.02); }

        .modal-actions .suspend { background: #ff9100; color: #fff; }
        .modal-actions .suspend:hover { background: #ffab40; transform: scale(1.02); }

        .modal-actions .delete { background: #ff4d4f; color: #fff; }
        .modal-actions .delete:hover { background: #ff6b6b; transform: scale(1.02); }

        @media (max-width: 600px) {
            .admin-header { flex-direction: column; align-items: stretch; }
            .modal-actions { grid-template-columns: 1fr; }
            #memberSearch { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="admin-container">

        <!-- HEADER -->
        <header class="admin-header">
            <h1><i class="fa-solid fa-user-shield"></i> Admin Panel</h1>
            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </header>

        <!-- CONTROLS -->
        <div class="admin-controls">
            <input type="text" id="memberSearch" placeholder="Search by name, email, or role..." />
        </div>

        <!-- TABLE -->
        <div class="table-responsive">
            <table class="members-table" id="membersTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Payment</th>
                        <th>Joined</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="membersBody">
                    <tr><td colspan="6" class="empty">Loading members...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- ============================================================
    MODAL
    ============================================================ -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Member Details</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal-avatar" id="memberAvatar">U</div>

            <div class="modal-field">
                <span class="label">Name</span>
                <span class="value" id="modalName">—</span>
            </div>
            <div class="modal-field">
                <span class="label">Email</span>
                <span class="value" id="modalEmail">—</span>
            </div>
            <div class="modal-field">
                <span class="label">Role</span>
                <span class="value" id="modalRole">—</span>
            </div>
            <div class="modal-field">
                <span class="label">Payment</span>
                <span class="value" id="modalPayment">—</span>
            </div>
            <div class="modal-field">
                <span class="label">Status</span>
                <span class="value" id="modalStatus">—</span>
            </div>
            <div class="modal-field">
                <span class="label">Joined</span>
                <span class="value" id="modalJoined">—</span>
            </div>

            <div class="modal-actions">
                <button class="approve" id="approveBtn"><i class="fa-solid fa-check"></i> Approve</button>
                <button class="premium" id="premiumBtn"><i class="fa-solid fa-crown"></i> Premium</button>
                <button class="admin" id="adminBtn"><i class="fa-solid fa-user-gear"></i> Admin</button>
                <button class="suspend" id="suspendBtn"><i class="fa-solid fa-pause"></i> Suspend</button>
                <button class="delete" id="deleteBtn" style="grid-column: span 2;"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <!-- 1. Auth guard – runs first -->
    <script type="module" src="js/auth.js"></script>

    <!-- 2. Admin logic (members.js) -->
    <script type="module" src="js/admin/members.js"></script>

    <!-- 3. Logout handler (fallback if auth.js doesn't handle it) -->
    <script type="module">
        import { auth } from "./js/firebase.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                await signOut(auth);
                window.location.href = "login.html";
            });
        }
    </script>

</body>
</html>
