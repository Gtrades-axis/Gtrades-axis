<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GTRADES AXIS | Admin Portal</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ===========================
SIDEBAR
============================ -->

<aside class="sidebar">

<div class="brand">

<img src="images/logo.png" alt="Logo">

<h2>

GTRADES

<span>AXIS™</span>

</h2>

</div>

<ul>

<li class="active">

<a href="#">

<i class="fa-solid fa-users"></i>

Members

</a>

</li>

<li>

<a href="#">

<i class="fa-solid fa-book"></i>

Academy

</a>

</li>

<li>

<a href="#">

<i class="fa-solid fa-folder-open"></i>

Resources

</a>

</li>

<li>

<a href="#">

<i class="fa-solid fa-credit-card"></i>

Payments

</a>

</li>

<li>

<a href="#">

<i class="fa-solid fa-gear"></i>

Settings

</a>

</li>

</ul>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</aside>

<!-- ===========================
MAIN CONTENT
============================ -->

<main class="admin-content">

<!-- Top -->

<div class="topbar">

<div>

<h1>Admin Dashboard</h1>

<p>

Welcome back Administrator

</p>

</div>

<div class="admin-profile">

<i class="fa-solid fa-user-shield"></i>

<span id="userName">

Administrator

</span>

</div>

</div>

<!-- Statistics -->

<div class="stats-grid">

<div class="stat-card">

<h2 id="totalMembers">

0

<h2 id="totalMembers">0</h2>

<h2 id="premiumMembers">0</h2>

<h2 id="pendingMembers">0</h2>

<h2 id="adminMembers">0</h2>

<!-- Members -->

<section class="members-section">

<div class="section-header">

<h2>

Members Management

</h2>

<input
type="text"
id="searchMembers"
placeholder="Search members...">

</div>

<div class="table-container">

<table class="members-table">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Role</th>

<th>Payment</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="membersTable">

</tbody>

</table>

</div>

</section>

</main>

<!-- ===========================
MEMBER MODAL
============================ -->

<div id="memberModal" class="member-modal">

<div class="member-modal-content">

<span
id="closeModal"
class="close-modal">

&times;

</span>

<h2>

Member Details

</h2>

<hr>

<p>

<strong>Name:</strong>

<span id="modalName" style="color:#ffffff;font-weight:600;"></span>

<span id="modalEmail" style="color:#ffffff;font-weight:600;"></span>

<span id="modalRole" style="color:#ffffff;font-weight:600;"></span>

<span id="modalPayment" style="color:#ffffff;font-weight:600;"></span>

<span id="modalStatus" style="color:#ffffff;font-weight:600;"></span>
</p>

<div class="modal-actions">

<button
id="approveBtn"
class="approve-btn">

✅ Approve

</button>

<button
id="premiumBtn"
class="premium-btn">

⭐ Premium

</button>

<button
id="adminBtn"
class="admin-btn">

👑 Make Admin

</button>

<button
id="suspendBtn"
class="suspend-btn">

⛔ Suspend

</button>

<button
id="deleteBtn"
class="delete-btn">

🗑 Delete

</button>

</div>

</div>

</div>

<script type="module" src="js/authGuard.js"></script>

<script type="module" src="js/admin/members.js"></script>

</body>

</html>
<!-- ========================= -->
<!-- RESOURCE MANAGEMENT -->
<!-- ========================= -->

<section class="admin-section">

    <h2>Resource Management</h2>

    <form id="resourceForm">

        <input
            type="text"
            id="resourceTitle"
            placeholder="Resource Title"
            required
        >

        <select id="resourceCategory">

            <option value="PDF">PDF</option>

            <option value="Indicator">Indicator</option>

            <option value="Template">Template</option>

            <option value="Checklist">Checklist</option>

        </select>

        <input
            type="url"
            id="resourceLink"
            placeholder="Download URL"
            required
        >

        <button type="submit">

            Upload Resource

        </button>

    </form>

</section>
<script type="module" src="js/admin/resources.js"></script>
<script type="module" src="js/admin.js"></script>

<script type="module" src="js/admin/members.js"></script>

<script type="module" src="js/admin/resources.js"></script>
